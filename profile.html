<style>
.fade-up {
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp .7s ease forwards;
}
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* RADIO */
.radio-label {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
  color: rgba(255,255,255,.85);
}
.radio-label input { display: none; }

.radio-circle {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,.4);
  display: grid;
  place-items: center;
  transition: .25s;
}
.radio-circle::after {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #facc15;
  transform: scale(0);
  transition: .25s;
}
.radio-label input:checked + .radio-circle {
  border-color: #facc15;
}
.radio-label input:checked + .radio-circle::after {
  transform: scale(1);
}

/* LOCKED STATE */
.locked input {
  pointer-events: none;
  opacity: .6;
}
.locked .radio-label {
  pointer-events: none;
  opacity: .6;
}
/* TOAST */
.toast {
  min-width: 280px;
  max-width: 360px;
  padding: 14px 18px;
  border-radius: 14px;
  backdrop-filter: blur(14px);
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.05)
  );
  border: 1px solid rgba(255,255,255,0.18);
  color: white;
  box-shadow: 0 20px 40px rgba(0,0,0,0.35);
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: toastIn .45s ease forwards;
}
.toast.success { border-left: 4px solid #facc15; }
.toast.error   { border-left: 4px solid #ef4444; }

@keyframes toastIn {
  from { opacity: 0; transform: translateY(-10px) scale(.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.toast-exit {
  animation: toastOut .35s ease forwards;
}
@keyframes toastOut {
  to { opacity: 0; transform: translateY(-10px) scale(.9); }
}
/* Make calendar icon white */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor: pointer;
}

</style>

<script>
const saveBtn = document.getElementById("saveBtn");
const form = document.getElementById("profileForm");
const fields = document.querySelectorAll(".field");

fields.forEach(f => {
  f.className += " bg-white/10 border border-white/10 rounded-lg px-4 py-3 outline-none focus:border-yellow-400";
});

saveBtn.onclick = () => {
  fields.forEach(f => f.setAttribute("readonly", true));
  form.classList.add("locked");
  saveBtn.textContent = "Saved ✓";
  saveBtn.classList.remove("bg-yellow-400");
  saveBtn.classList.add("bg-white/20", "cursor-not-allowed");
  saveBtn.disabled = true;
};
</script>

<script type="module">
  import { updateProfile } from "./auth.js";

  const saveBtn = document.getElementById("saveBtn");

  saveBtn.onclick = async () => {
    const profile = {
      first_name: document.getElementById("firstName").value.trim(),
      last_name: document.getElementById("lastName").value.trim(),
      gender: document.querySelector('input[name="gender"]:checked')?.value || null,
      dob: document.getElementById("dobField").value || null,
      phone: document.getElementById("phoneField").value.trim(),
      email: document.getElementById("emailField").value.trim(),
      full_name:
        document.getElementById("firstName").value.trim() +
        " " +
        document.getElementById("lastName").value.trim()
    };

    try {
  await updateProfile(profile);

  saveBtn.textContent = "Saved ✓";
  saveBtn.disabled = true;
  saveBtn.classList.add("bg-white/20", "cursor-not-allowed");

  showToast("Profile updated successfully");
} catch (e) {
  console.error(e);
  showToast("Failed to save profile", "error");
}

  };
</script>

<script type="module">
  import { logout } from "./auth.js";

  const logoutBtn = document.getElementById("logoutBtn");

  logoutBtn.addEventListener("click", async () => {
    await logout();
  });
</script>

<script type="module">
  import { supabase } from "./auth.js";

  document.addEventListener("DOMContentLoaded", async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;

    // ✅ Get name from Google
    const fullName =
      user.user_metadata?.full_name ||
      user.user_metadata?.name ||
      user.email.split("@")[0];

    const nameParts = fullName.split(" ");
    const firstName = nameParts[0] || "";
    const lastName = nameParts.slice(1).join(" ") || "";

    // ✅ Fill sidebar
    document.getElementById("userName").textContent = firstName;
    document.getElementById("userInitial").textContent =
      firstName.charAt(0).toUpperCase();

    // ✅ AUTO FILL FORM FIELDS
    document.getElementById("firstName").value = firstName;
    document.getElementById("lastName").value = lastName;
    document.getElementById("emailField").value = user.email;

    // ⚠️ Gender (only if stored previously in DB)
    if (user.user_metadata?.gender) {
      const genderRadio = document.querySelector(
        `input[name="gender"][value="${user.user_metadata.gender}"]`
      );
      if (genderRadio) genderRadio.checked = true;
    }
  });
</script>
<script>
function showToast(message, type = "success") {
  const container = document.getElementById("toastContainer");

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;

  toast.innerHTML = `
    <div class="mt-1">${type === "success" ? "✅" : "⚠️"}</div>
    <div>
      <p class="font-semibold">${type === "success" ? "Success" : "Error"}</p>
      <p class="text-sm text-white/80">${message}</p>
    </div>
  `;

  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add("toast-exit");
    setTimeout(() => toast.remove(), 350);
  }, 3000);
}
</script>
