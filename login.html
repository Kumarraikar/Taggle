<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TAGGLE — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

    tailwind.config = {

        extend: {

    }


</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23288977'/%3E%3Ctext x='50' y='62' font-size='54' text-anchor='middle' fill='white' font-family='Arial'%3ET%3C/text%3E%3C/svg%3E">
</head>

<body class="min-h-screen bg-gradient-to-b from-black via-[#0d1b2a] to-[#1b263b] text-white antialiased flex flex-col">

  <!-- Top mini header -->
  <header class="w-full bg-[#0a192f]/80 backdrop-blur">
    <nav class="w-full">
      <div class="mx-auto w-full px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <a href="combine.html" class="flex items-center gap-2">
          <span class="text-2xl font-bold text-white">TAGGLE</span>
        </a>
        <a href="signup.html" class="text-sm text-white/80 hover:text-white">
          New here? <span class="font-semibold text-yellow-300">Create account</span>
        </a>
      </div>
    </nav>
  </header>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <div class="bg-white/5 border border-white/10 rounded-3xl shadow-card p-8 backdrop-blur">
        <h1 class="font-display text-3xl sm:text-4xl mb-2">Welcome back</h1>
        <p class="text-white/70 text-sm mb-8">
          Sign in to manage your bookings, compare new deals, and plan your next trip.
        </p>

        <form class="space-y-5">
          <!-- Email -->
          <div>
            <label for="email" class="block text-sm mb-1.5 text-white/80">Email address</label>
            <input
              id="email"
              name="email"
              type="email"
              required
              class="w-full rounded-xl bg-white/5 border border-white/15 px-3 py-2.5 text-sm outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 placeholder:text-white/40"
              placeholder="you@example.com"
            />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="block text-sm text-white/80">Password</label>
              <a href="#" class="text-xs text-yellow-300 hover:text-yellow-200">Forgot password?</a>
            </div>
            <input
              id="password"
              name="password"
              type="password"
              required
              class="w-full rounded-xl bg-white/5 border border-white/15 px-3 py-2.5 text-sm outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 placeholder:text-white/40"
              placeholder="••••••••"
            />
          </div>

          <!-- Remember me -->
          <!-- Submit -->
          <button
            type="submit"
            class="w-full mt-2 rounded-xl bg-yellow-400 px-4 py-2.5 text-sm font-semibold text-black hover:brightness-110 active:brightness-95 shadow shadow-yellow-500/30">
            Login
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-6">
          <span class="h-px flex-1 bg-white/10"></span>
          <span class="text-xs text-white/50">or continue with</span>
          <span class="h-px flex-1 bg-white/10"></span>
        </div>

        <!-- Social buttons (optional) -->
<div class="flex justify-center">
  <button
    id="googleLoginBtn"
    type="button"
    class="flex items-center justify-center gap-3 rounded-xl border border-white/10 bg-white/5 px-8 py-3 text-white hover:bg-white/10 transition"
  >
    <img
      src="https://www.svgrepo.com/show/475656/google-color.svg"
      alt="Google"
      class="h-5 w-5"
    />
    <span class="text-sm font-medium">Continue with Google</span>
  </button>
</div>
        

        <p class="mt-6 text-center text-xs text-white/60">
          Don’t have an account?
          <a href="signup.html" class="text-yellow-300 hover:text-yellow-200 font-medium">Create account
</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center text-xs text-white/40">
    © 2025 TAGGLE. All rights reserved.
  </footer>
  
<script type="module">
  import {
    supabase,
    login,
    loginWithGoogle
  } from "./auth.js";

  // DOM elements
  const form = document.querySelector("form");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");

  // 🚫 Block logged-in users from seeing login page
  (async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session) {
      window.location.href = "combine.html";
    }
  })();

  // Email + Password login
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      showToast("Email and password required");

      return;
    }

    if (password.length < 6) {
     showToast("Password must be at least 6 characters");

      return;
    }

    const { error } = await login(email, password);

   if (error) {
  showToast("Invalid login credentials", "error");
  return;
}

showToast("Login successful!", "success");

setTimeout(() => {
  window.location.href = "combine.html";
}, 1000);

    window.location.href = "combine.html";
  });

  // Google login
  document
    .getElementById("googleLoginBtn")
    ?.addEventListener("click", loginWithGoogle);
</script>
<!-- Toast -->
<!-- Toast -->
<div id="toast"
  class="fixed top-10 left-1/2 -translate-x-1/2
         px-8 py-2 rounded-2xl
         backdrop-blur-xl shadow-2xl
         opacity-0 pointer-events-none
         transition-all duration-300 z-50 text-center">
</div>


<script>
function showToast(message, type = "error") {
  const toast = document.getElementById("toast");

  toast.textContent = message;

  // Reset color classes
  toast.classList.remove(
    "bg-red-500/20", "border-red-400/40",
    "bg-green-500/20", "border-green-400/40"
  );

  // Apply color based on type
  if (type === "success") {
    toast.classList.add("bg-green-500/20", "border", "border-green-400/40");
  } else {
    toast.classList.add("bg-red-500/20", "border", "border-red-400/40");
  }

  toast.classList.remove("opacity-0", "pointer-events-none");
  toast.classList.add("opacity-100");

  setTimeout(() => {
    toast.classList.remove("opacity-100");
    toast.classList.add("opacity-0");
  }, 2000);
}
</script>

</body>
</html>
