<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TAGGLE — Sign Up</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f9f6',
              100: '#d9f2ea',
              200: '#b7e6d8',
              300: '#88d5c2',
              400: '#5fc2aa',
              500: '#3aa992',
              600: '#288a77',
              700: '#216e61',
              800: '#1f574f',
              900: '#1d4742',
            },
          },
          boxShadow: {
            card: '0 15px 35px rgba(0,0,0,.25)',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'ui-sans-serif', 'Helvetica', 'Arial'],
            display: ['Fraunces', 'Georgia', 'ui-serif', 'serif'],
          }
        }
      }
    }
</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,800;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23288977'/%3E%3Ctext x='50' y='62' font-size='54' text-anchor='middle' fill='white' font-family='Arial'%3ET%3C/text%3E%3C/svg%3E">
</head>

<body class="min-h-screen bg-gradient-to-b from-black via-[#0d1b2a] to-[#1b263b] text-white antialiased flex flex-col">

  <!-- Top mini header -->
  <header class="w-full bg-[#0a192f]/80 backdrop-blur">
    <nav class="w-full">
      <div class="mx-auto w-full px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
        <a href="combine.html" class="flex items-center gap-2">
          <span class="text-2xl font-bold text-white">TAGGLE</span>
        </a>
        <a href="login.html" class="text-sm text-white/80 hover:text-white">
         Already have an account?
<span class="font-semibold text-yellow-300">Sign Up</span>
        </a>
      </div>
    </nav>
  </header>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center px-4 py-8">
    <div class=" relative max-w-md">
      <div class="bg-white/5 border border-white/10 rounded-3xl shadow-card p-8 backdrop-blur">
        <h1 class="font-display text-3xl sm:text-4xl mb-2">Create your account</h1>
        <p class="text-white/70 text-sm mb-8">
          Join TAGGLE to save your trips, track prices, and get the best travel deals.
        </p>

        <form id="form" action="#" method="POST" class="space-y-5">
          <!-- Full name -->
          <div>
            <label for="name" class="block text-sm mb-1.5 text-white/80">Full name</label>
            <input
              id="fullName"
              name="name"
              autocomplete="off"
              type="text"
              required
              class="w-full rounded-xl bg-white/5 border border-white/15 px-3 py-2.5 text-sm outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 placeholder:text-white/40"
              placeholder="Enter Your Name"
            />
          </div>

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm mb-1.5 text-white/80">Email address</label>
            <input
              id="email"
              name="email"
              autocomplete="off"
              type="email"
              required
              class="w-full rounded-xl bg-white/5 border border-white/15 px-3 py-2.5 text-sm outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 placeholder:text-white/40"
              placeholder="you@example.com"
            />
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm mb-1.5 text-white/80">Password</label>
            <input
              id="password"
              name="password"
              autocomplete="off"
              type="password"
              required
              class="w-full rounded-xl bg-white/5 border border-white/15 px-3 py-2.5 text-sm outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 placeholder:text-white/40"
              placeholder="Create a strong password"
            />
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm mb-1.5 text-white/80">Confirm password</label>
            <input
              id="confirmPassword"
              name="confirmPassword"
              type="password"
              required
              class="w-full rounded-xl bg-white/5 border border-white/15 px-3 py-2.5 text-sm outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 placeholder:text-white/40"
              placeholder="Re-enter your password"
            />
          </div>

          <!-- Terms -->
          <div class="flex items-start gap-2 text-xs text-white/70">
            <input type="checkbox" required class="mt-0.5 rounded border-white/30 bg-white/5 text-yellow-400 focus:ring-yellow-400">
            <p>
              I agree to the
              <a href="#" class="text-yellow-300 hover:text-yellow-200">Terms of Service</a>
              and
              <a href="#" class="text-yellow-300 hover:text-yellow-200">Privacy Policy</a>.
            </p>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="w-full mt-2 rounded-xl bg-yellow-400 px-4 py-2.5 text-sm font-semibold text-black hover:brightness-110 active:brightness-95 shadow shadow-yellow-500/30">
            Sign In
          </button>
        </form>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center text-xs text-white/40">
    © 2025 TAGGLE. All rights reserved.
  </footer>
  <script type="module">
  import { signUp } from "./auth.js";

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("form");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (!fullName || !email || !password) {
        alert("Please fill all fields");
        return;
      }

      if (password !== confirm) {
        showToast("Passwords do not match");
        return;
      }

      // ✅ PASS VALUES PROPERLY
      signUp(email, password, fullName);
    });
  });
</script>
<!-- Toast -->
<div id="toast"
  class="fixed top-16 left-1/2 -translate-x-1/2
         bg-red-500/20 border border-red-400/40
         text-red-300 px-8 py-2 rounded-2xl
         backdrop-blur-xl shadow-2xl
         opacity-0 pointer-events-none
         transition-all duration-300 z-50 text-center">
</div>

<script>
function showToast(message, type = "error") {
  const toast = document.getElementById("toast");

  toast.textContent = message;

  // Base style
  toast.className =
    "fixed top-16 left-1/2 -translate-x-1/2 px-8 py-2 rounded-2xl backdrop-blur-xl shadow-2xl transition-all duration-300 z-50 text-center opacity-0";

  if (type === "success") {
    toast.classList.add("bg-green-500/20", "border", "border-green-400/40", "text-green-300");
  } else {
    toast.classList.add("bg-red-500/20", "border", "border-red-400/40", "text-red-300");
  }

  // Show
  setTimeout(() => {
    toast.classList.remove("opacity-0");
    toast.classList.add("opacity-100");
  }, 10);

  // Hide faster
  setTimeout(() => {
    toast.classList.remove("opacity-100");
    toast.classList.add("opacity-0");
  }, 1500);
}

</script>


</body>
</html>
